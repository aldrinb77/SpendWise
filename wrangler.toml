name = "expense-tracker"
pages_build_output_dir = ".next"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"

[[d1_databases]]
binding = "DB"
database_name = "expense-tracker-db"
database_id = "03b54dc6-b590-42c3-bbfd-f15e7f59171d"

[[r2_buckets]]
binding = "R2"
bucket_name = "expense-tracker-assets"

[[kv_namespaces]]
binding = "KV"
id = "a1a29e181da541d89af6c34bfafa79a0"

[vars]
NEXT_PUBLIC_APP_URL = "http://localhost:3000"
JWT_SECRET = "spendwise_super_secure_jwt_key_2026_xyz"
